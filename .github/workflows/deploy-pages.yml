name: Deploy reader to GitHub Pages

# Type-checks, runs the test suite (including every adversarial/negative test against the
# committed data/graph.json), builds the static reader (vite build -> dist/), and scans the
# shipped bytes for network/model clients BEFORE publishing to GitHub Pages. The deploy is
# the URL in the README hero; a broken push must not reach it.
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Gate the deploy on the same deterministic checks the local acceptance bar runs.
      # Vite will happily bundle type-broken code, so typecheck must run before build; the
      # bundle scan must run after build because it inspects emitted bytes. Paid-key stages
      # (atomize, render) and the upstream network re-fetch (VERIFY_UPSTREAM=1) are
      # deliberately omitted — they have no place on the deploy path.
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm verify:bundle
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
